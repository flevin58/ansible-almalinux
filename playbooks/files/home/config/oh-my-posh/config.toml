version = 4

[palette]
battery_bg = '#f36943'
battery_bg_charging = '#b8e994'
battery_bg_discharging = '#fff34e'
battery_bg_full = '#33DD2D'
battery_fg = '#262626'
date_bg = '#6d1d8f'
date_fg = '#ffffff'
exec_time_bg = '#83769c'
exec_time_fg = '#ffffff'
git_bg = '#FFFB38'
git_bg_ahead = '#C792EA'
git_bg_ahead_and_behind = '#c5e478'
git_bg_behind = '#C792EA'
git_bg_changed = '#ffeb95'
git_fg = '#011627'
git_staging_changed = '#ef5350'
lang_bg = '#5aa95a'
lang_fg = '#000000'
os_bg = '#F0F0F0'
os_fg = '#000000'
path_bg = '#FF9248'
path_fg = '#2d3436'
prompt_err = '#ef5350'
prompt_ok = '#e0f8ff'
root_bg = '#ef5350'
root_fg = '#FFFB38'

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'

[[blocks.segments]]
leading_diamond = ''
trailing_diamond = ''
template = ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} {{.HostName}} '
foreground = 'p:os_fg'
background = 'p:os_bg'
type = 'os'
style = 'diamond'

[blocks.segments.options]
linux = ''
macos = ''
windows = ''

[[blocks.segments]]
trailing_diamond = ''
template = '<parentBackground></>  '
foreground = 'p:root_fg'
background = 'p:root_bg'
type = 'root'
style = 'diamond'

[[blocks.segments]]
trailing_diamond = ' '
foreground = 'p:path_fg'
background = 'p:path_bg'
type = 'path'
style = 'diamond'

[blocks.segments.options]
folder_icon = '  '
home_icon = '  '
max_depth = 3
style = 'agnoster_full'
'~/dotfiles' = '★dotfiles'

[[blocks.segments]]
trailing_diamond = ' '
template = 'Python {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}'
foreground = 'p:lang_fg'
background = 'p:lang_bg'
type = 'python'
style = 'diamond'

[[blocks.segments]]
trailing_diamond = ' '
template = 'Go {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
foreground = 'p:lang_fg'
background = 'p:lang_bg'
type = 'go'
style = 'diamond'

[[blocks.segments]]
trailing_diamond = ' '
template = 'Rust {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
foreground = 'p:lang_fg'
background = 'p:lang_bg'
type = 'rust'
style = 'diamond'

[[blocks.segments]]
trailing_diamond = ' '
template = 'Zig {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
foreground = 'p:lang_fg'
background = 'p:lang_bg'
type = 'zig'
style = 'diamond'

[[blocks.segments]]
trailing_diamond = ' '
template = ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<p:git_staging_changed>  {{ .Staging.String }}</>{{ end }} '
foreground = 'p:git_fg'
background = 'p:git_bg'
type = 'git'
style = 'diamond'
background_templates = [
  '{{ if or (.Working.Changed) (.Staging.Changed) }}p:git_bg_changed{{ end }}',
  '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:git_bg_ahead_and_behind{{ end }}',
  '{{ if gt .Ahead 0 }}p:git_bg_ahead{{ end }}',
  '{{ if gt .Behind 0 }}p:git_bg_behind{{ end }}',
]

[blocks.segments.options]
branch_icon = ' '
fetch_status = true
fetch_upstream_icon = true

[[blocks]]
type = 'prompt'
alignment = 'right'

[[blocks.segments]]
leading_diamond = ''
trailing_diamond = ''
template = '⏲ {{ .FormattedMs }}'
foreground = 'p:exec_time_fg'
background = 'p:exec_time_bg'
type = 'executiontime'
style = 'diamond'

[blocks.segments.options]
style = 'roundrock'
threshold = 0

[[blocks.segments]]
trailing_diamond = ''
template = ' {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }} '
foreground = 'p:battery_fg'
background = 'p:battery_bg'
type = 'battery'
style = 'diamond'
background_templates = [
  '{{if eq "Charging" .State.String}}p:battery_bg_charging{{end}}',
  '{{if eq "Discharging" .State.String}}p:battery_bg_discharging{{end}}',
  '{{if eq "Full" .State.String}}p:battery_bg_full{{end}}',
]
invert_powerline = true

[blocks.segments.options]
charged_icon = ' '
charging_icon = ' '
discharging_icon = ' '

[[blocks.segments]]
trailing_diamond = ''
template = '  {{ .CurrentDate | date .Format }} '
foreground = 'p:date_fg'
background = 'p:date_bg'
type = 'time'
style = 'diamond'
invert_powerline = true

[blocks.segments.options]
time_format = 'Mon 3:04 PM'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

[[blocks.segments]]
template = '» '
foreground = 'p:prompt_ok'
type = 'status'
style = 'plain'
foreground_templates = ['{{ if gt .Code 0 }}p:prompt_err{{ end }}']

[blocks.segments.options]
always_enabled = true