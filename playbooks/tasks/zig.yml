- name: Create directory for Zig binary & files
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/zig"
    state: directory
    mode: 0755
- name: Install Zig on MacOS
  community.general.homebrew:
    name: zig
    state: present
  when: ansible_facts.distribution == "MacOSX"
#
# Add zig to PATH
#
- name: Ensure {{ ansible_facts.user_dir}}/zig is in PATH
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts.user_dir }}/.zshenv"
    insertbefore: "{{ zshenv.path_end }}"
    search_string: "$HOME/zig"
    line: 'export PATH="$PATH:$HOME/zig"'
#
# Install zig VSCode extension
#
- name: Install VS Code extension for Zig
  ansible.builtin.command: "code --force --install-extension ziglang.vscode-zig"
#
# Install Zig Language Server
#
- name: Install Zig Language Server on MacOS
  community.general.homebrew:
    name: zls
    state: present
  when: ansible_facts.distribution == "MacOSX"
