- name: Install neovim for Ubuntu
  become: true
  ansible.builtin.apt:
    name: neovim
    state: present
  when: ansible_facts.distribution == "Ubuntu"
- name: Install neovim for MacOS
  community.general.homebrew:
    name: neovim
    state: present
  when: ansible_facts.distribution == "MacOSX"
- name: Delete current neovim config directory if it exists
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config/nvim"
    state: absent
- name: Copy configutation files for neovim
  ansible.builtin.copy:
    force: true
    src: ../files/home/config/nvim/
    dest: "{{ ansible_facts.user_dir }}/.config/nvim/"
- name: Ensure neovim is set as default editor
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts.user_dir }}/.zshenv"
    insertbefore: "{{ zshenv.env_end }}"
    search_string: "EDITOR="
    line: "export EDITOR=/opt/homebrew/bin/nvim"
