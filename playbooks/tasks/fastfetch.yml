- name: Install fastfetch on Ubuntu
  become: true
  ansible.builtin.dnf:
    name: fastfetch
    state: present
  when: ansible_facts.distribution == "Ubuntu"

- name: Install fastfetch on MacOS
  community.general.homebrew:
    name: fastfetch
    state: present
  when: ansible_facts.distribution == "MacOSX"

- name: Create fastfetch config directory
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config/fastfetch"
    state: directory

- name: Configure fastfetch
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/home/config/fastfetch/config.jsonc"
    dest: "{{ ansible_facts.user_dir }}/.config/fastfetch/config.jsonc"
